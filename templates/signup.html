<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Signup</title>
        <link>
    </head>

    <body>
        <div class="form-wrapper">
            <form id="login-form">
                <div>
                    <input required type="text" name="firstname" id="email-input" placeholder="Email">
                </div>
                <div>
                    <input required type="password" name="password" id="password-input" placeholder="Password">
                </div>
                <div>
                    <input required type="password" name="confirm-password" id="confirm-password-input" placeholder="Confirm Password">
                </div>
                <button type="submit">Signup</button>
            </form>

        </div>
    </body>

</html>
